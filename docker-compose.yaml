services:
  db:
    image: mysql:8.0
    container_name: tripstar-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-tripstar123}
      MYSQL_DATABASE: ${DB_NAME:-tripstar}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-tripstar123}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  trip-planner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_AMAP_WEB_JS_KEY: ${VITE_AMAP_WEB_JS_KEY:-your_amap_web_js_api_key_here}
        VITE_AMAP_WEB_KEY: ${VITE_AMAP_WEB_KEY:-your_amap_web_api_key_here}
    container_name: helloagents-trip-planner
    ports:
      - "7860:7860"
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-your_key}
      - LLM_BASE_URL=${LLM_BASE_URL:-your_url}
      - LLM_MODEL_ID=${LLM_MODEL_ID:-your_model}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-600}
      - VITE_AMAP_WEB_KEY=${VITE_AMAP_WEB_KEY:-your_amap_web_api_key_here}
      - XHS_COOKIE=${XHS_COOKIE:-your_xhs_cookie_here}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - GOOGLE_MAPS_PROXY=${GOOGLE_MAPS_PROXY:-}
      - HOST=0.0.0.0
      - PORT=7860
      - LOG_LEVEL=INFO
      # 数据库配置（连接 Docker 内的 MySQL 服务）
      - DB_TYPE=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-tripstar123}
      - DB_NAME=${DB_NAME:-tripstar}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - trip_data:/app/backend/data
    restart: unless-stopped

volumes:
  mysql_data:
  trip_data:
